<h1 id="user-content-view-resolved-environment" level="1" node="[object Object]" data-pagefind-weight="1"><a class="autolink-header" aria-hidden="true" tabindex="-1" aria-label="Copy link to section" href="#view-resolved-environment"><svg class="autolink-img" xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" viewBox="0 0 25 25"><path d="M20.368,10.29l-1.839,1.84a.75.75,0,1,1-1.061-1.06l1.84-1.841a3.214,3.214,0,0,0,0-4.539,3.286,3.286,0,0,0-4.538,0L11.411,8.05a2.3,2.3,0,0,0-.3.357,3.188,3.188,0,0,0,.3,4.183.75.75,0,1,1-1.061,1.06,4.664,4.664,0,0,1-.474-6.094,3.625,3.625,0,0,1,.474-.566l3.359-3.36a4.709,4.709,0,1,1,6.659,6.66Zm-7.779.06a.749.749,0,0,0,0,1.06,3.172,3.172,0,0,1,.749,3.353,3.068,3.068,0,0,1-.749,1.187L9.23,19.31a3.286,3.286,0,0,1-4.538,0,3.214,3.214,0,0,1,0-4.539l1.84-1.841a.75.75,0,1,0-1.061-1.06L3.632,13.71a4.709,4.709,0,1,0,6.659,6.66l3.359-3.36a4.546,4.546,0,0,0,1.105-1.756,4.712,4.712,0,0,0-1.105-4.9A.75.75,0,0,0,12.589,10.35Z"></path></svg></a>查看已解析环境</h1>
<p>获取 Spark 环境后，您可以在“已解析依赖项”对话框中查看该环境内安装的具体包。如需打开此对话框，请选择 <strong>环境 &gt; 查看已解析包</strong>。对话框将显示直接依赖项和传递依赖项的列表。</p>
<p><img alt="environment view resolved" height="600" src="/docs/resources/foundry/code-workbook/environment-view-resolved.png" style="aspect-ratio:1170 / 1218" width="576.3546798029557" node="[object Object]"></p>
<p>直接依赖项是由用户明确指定纳入 Spark 环境的包。您可以在 <strong>自定义 Spark 环境</strong> 菜单中指定直接依赖项。</p>
<p>传递依赖项则是直接依赖项所依赖的包。例如，依赖 <code>statsmodels</code> 会传递性地导入 <code>NumPy</code>、<code>SciPy</code>、<code>MatPlotLib</code> 及其各自的依赖项。</p>
<p><img alt="environment view dependency tree" height="376" src="/docs/resources/foundry/code-workbook/environment-view-tree.png" style="aspect-ratio:436 / 376" width="436" node="[object Object]"></p>
