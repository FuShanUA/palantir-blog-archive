<section id="real-time-alerting-hero" class="ptcom-design__section__1o9c6nt ptcom-design__sectionlight__1o9c6nt" data-background="light"><div class="ptcom-design__container__1o9c6nt"><div class="ptcom-design__header__15wj5m3 ptcom-design__header400__15wj5m3"><h1 data-testid="heading" data-animation="header" data-rendered-size="400" class="ptcom-design__heading__9pryq9 ptcom-design__heading400__9pryq9" style="opacity: 1;">Foundry 规则与实时预警</h1><div class="ptcom-design__description__15wj5m3" style="transform: translate(0px, 0px); opacity: 1;"><div class="ptcom-design__text__1nkr7ha ptcom-design__descriptionText__15wj5m3"><div><p>利用专家制定的规则，创建具备对象感知能力的预警。在企业业务中无缝衔接预警与行动。</p></div></div></div></div><div class="ptcom-design__video__1sh13ll"><div class="ptcom-design__image__1bamxf7 ptcom-design__image__1sh13ll"><div><img src="/assets/xrfr7uokpv1b/3p5yxi1O4hB3JkVlqmG9bR/a02e5a1f917fff16e14a02d5472c273f/Asset_21RULES.png?quality=70&amp;width=1600&amp;height=819&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/3p5yxi1O4hB3JkVlqmG9bR/a02e5a1f917fff16e14a02d5472c273f/Asset_21RULES.png?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/3p5yxi1O4hB3JkVlqmG9bR/a02e5a1f917fff16e14a02d5472c273f/Asset_21RULES.png?quality=70&amp;width=900 900w, /assets/xrfr7uokpv1b/3p5yxi1O4hB3JkVlqmG9bR/a02e5a1f917fff16e14a02d5472c273f/Asset_21RULES.png?quality=70&amp;width=1200 1200w, /assets/xrfr7uokpv1b/3p5yxi1O4hB3JkVlqmG9bR/a02e5a1f917fff16e14a02d5472c273f/Asset_21RULES.png?quality=70&amp;width=1600 1600w, /assets/xrfr7uokpv1b/3p5yxi1O4hB3JkVlqmG9bR/a02e5a1f917fff16e14a02d5472c273f/Asset_21RULES.png?quality=70&amp;width=2200 2200w" sizes="100vw" alt="Foundry 规则视频图像" width="1600" height="819" loading="lazy"></div></div><div class="ptcom-design__play__1sh13ll"><svg class="ptcom-design__icon__1sh13ll" width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path class="ptcom-design__iconbg__1sh13ll" d="M0 0h40v40H0z"></path><path class="ptcom-design__iconplay__1sh13ll" d="M28 20l-12 6.928V13.072L28 20z"></path></svg><span>播放视频</span></div><iframe class="ptcom-design__iframe__1sh13ll" src="https://player.vimeo.com/video/798855977?dnt=1" srcdoc="&lt;style&gt;body{margin:0;padding:0;overflow:hidden}a{position:absolute;width:100%;top:0;bottom:0;}&lt;/style</article></div></section><section id="rules-key-features" class="ptcom-design__section__1o9c6nt ptcom-design__sectionlight__1o9c6nt" data-background="light"><div class="ptcom-design__container__1o9c6nt"><div class="ptcom-design__header__15wj5m3 ptcom-design__header200__15wj5m3"><div class="ptcom-design__animatedLine__116w76e ptcom-design__line__1c63wat ptcom-design__large__1c63wat"><div class="ptcom-design__animatedLineRule__116w76e" style="transform: translate(-100%, 0px);"></div></div><h2 data-testid="heading" data-animation="header" data-rendered-size="200" class="ptcom-design__heading__9pryq9 ptcom-design__heading200__9pryq9" style="opacity: 0;">Key Features</h2></div><div><div class="ptcom-design__paragraph__du7ili ptcom-design__paragraph200__du7ili ptcom-design__twoParagraph__du7ili"><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/xwIi6NdAPuQVsDG1MXOkb/1548785a47e178785de32499cc33c58c/FoundryRules_KeyFeatures.png?quality=70&amp;width=1800" srcset="/assets/xrfr7uokpv1b/xwIi6NdAPuQVsDG1MXOkb/1548785a47e178785de32499cc33c58c/FoundryRules_KeyFeatures.png?quality=70&amp;width=1600 1600w, /assets/xrfr7uokpv1b/xwIi6NdAPuQVsDG1MXOkb/1548785a47e178785de32499cc33c58c/FoundryRules_KeyFeatures.png?quality=70&amp;width=1200 1200w, /assets/xrfr7uokpv1b/xwIi6NdAPuQVsDG1MXOkb/1548785a47e178785de32499cc33c58c/FoundryRules_KeyFeatures.png?quality=70&amp;width=1000 1000w, /assets/xrfr7uokpv1b/xwIi6NdAPuQVsDG1MXOkb/1548785a47e178785de32499cc33c58c/FoundryRules_KeyFeatures.png?quality=70&amp;width=800 800w, /assets/xrfr7uokpv1b/xwIi6NdAPuQVsDG1MXOkb/1548785a47e178785de32499cc33c58c/FoundryRules_KeyFeatures.png?quality=70&amp;width=640 640w, /assets/xrfr7uokpv1b/xwIi6NdAPuQVsDG1MXOkb/1548785a47e178785de32499cc33c58c/FoundryRules_KeyFeatures.png?quality=70&amp;width=480 480w" alt="Real-Time Alerting Key Features Image" loading="lazy"></div></div></div></div></div><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><p><b>Flexible Rule Authoring. </b></p><p><b></b></p><p>Rule inputs can be datasets, objects from your organization’s ontology, and time series. With the <a href="https://www.palantir.com/platforms/foundry/">Foundry Ontology</a>, your non-technical users craft rules within an intuitive, real-world representation of their business. </p><p>

<b>Backtesting on Historical Data. </b></p><p><b></b></p><p>Use historical data to backtest potential rules and deploy to production with confidence. </p><p>

<b>Rule Proposals. </b></p><p><b></b></p><p>Apply software development principles to propose and update rules in a pull request framework, allowing for multiple simultaneous change requests, each of which can be submitted, reviewed, and monitored. Proposals can be customized to match diverse business and regulatory requirements for rule change management over time. </p><p>

<b>Advanced Integrations.</b></p><p><b></b></p><p>Rules can generate alerts in-platform as well as integrate with third-party software (e.g., incident response software) to surface alerts in text messages and other methods of communication, ensuring they reach decision-makers throughout your business. </p><p>

<b>Model-Driven Alert Resolution. </b></p><p><b></b></p><p>Foundry captures the history of all decisions made based on alerts and feeds learnings into models, allowing them to intelligently suggest remediations or even automatically action alerts, decreasing response time in fast-moving situations. </p></div></div></div></div></div></div></section><section id="rules-how-it-works" class="ptcom-design__section__1o9c6nt ptcom-design__sectionlight__1o9c6nt" data-background="light"><div class="ptcom-design__container__1o9c6nt"><div class="ptcom-design__header__15wj5m3 ptcom-design__header200__15wj5m3"><div class="ptcom-design__animatedLine__116w76e ptcom-design__line__1c63wat ptcom-design__large__1c63wat"><div class="ptcom-design__animatedLineRule__116w76e" style="transform: translate(-100%, 0px);"></div></div><h2 data-testid="heading" data-animation="header" data-rendered-size="200" class="ptcom-design__heading__9pryq9 ptcom-design__heading200__9pryq9" style="opacity: 0;">How It Works</h2></div><div><div class="ptcom-design__paragraph__du7ili ptcom-design__paragraph200__du7ili ptcom-design__twoParagraph__du7ili"><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/3OVtb5yXdfs7zCeVmwp40Q/889887562659e9fd73c2c10813317c96/Asset_22RULES.png?quality=70&amp;width=1800" srcset="/assets/xrfr7uokpv1b/3OVtb5yXdfs7zCeVmwp40Q/889887562659e9fd73c2c10813317c96/Asset_22RULES.png?quality=70&amp;width=1600 1600w, /assets/xrfr7uokpv1b/3OVtb5yXdfs7zCeVmwp40Q/889887562659e9fd73c2c10813317c96/Asset_22RULES.png?quality=70&amp;width=1200 1200w, /assets/xrfr7uokpv1b/3OVtb5yXdfs7zCeVmwp40Q/889887562659e9fd73c2c10813317c96/Asset_22RULES.png?quality=70&amp;width=1000 1000w, /assets/xrfr7uokpv1b/3OVtb5yXdfs7zCeVmwp40Q/889887562659e9fd73c2c10813317c96/Asset_22RULES.png?quality=70&amp;width=800 800w, /assets/xrfr7uokpv1b/3OVtb5yXdfs7zCeVmwp40Q/889887562659e9fd73c2c10813317c96/Asset_22RULES.png?quality=70&amp;width=640 640w, /assets/xrfr7uokpv1b/3OVtb5yXdfs7zCeVmwp40Q/889887562659e9fd73c2c10813317c96/Asset_22RULES.png?quality=70&amp;width=480 480w" alt="Real-Time Alerting How It Works 1" loading="lazy"></div></div><h3>

</h3></div></div></div><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><hr><h2>Make the rules. </h2><h3>Rules are most powerful when subject matter experts create them, regardless of technical ability. Foundry Rules &amp; Real-Time Alerting empowers your non-technical users to actively manage complex business logic with a point-and-click, low-code interface. </h3></div></div></div></div></div><div><div class="ptcom-design__paragraph__du7ili ptcom-design__paragraph200__du7ili ptcom-design__twoParagraph__du7ili"><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><hr><h2>Any data. Any time. </h2><h3>Apply rules to datasets, objects, and <a href="https://www.palantir.com/docs/foundry/foundry-rules/timeseries-concepts/">time series</a> data with billions or trillions of streaming data points for real-time process monitoring and alerting — all within the <a href="/platforms/foundry/">Foundry Ontology</a>, so your users are always working in a real-world representation of their business.</h3></div></div></div><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/GCrvg4l9pSk9FjTlSANpS/0da5c5786b4fc57746cbea6d6c03467f/Asset_23RULES.png?quality=70&amp;width=1800" srcset="/assets/xrfr7uokpv1b/GCrvg4l9pSk9FjTlSANpS/0da5c5786b4fc57746cbea6d6c03467f/Asset_23RULES.png?quality=70&amp;width=1600 1600w, /assets/xrfr7uokpv1b/GCrvg4l9pSk9FjTlSANpS/0da5c5786b4fc57746cbea6d6c03467f/Asset_23RULES.png?quality=70&amp;width=1200 1200w, /assets/xrfr7uokpv1b/GCrvg4l9pSk9FjTlSANpS/0da5c5786b4fc57746cbea6d6c03467f/Asset_23RULES.png?quality=70&amp;width=1000 1000w, /assets/xrfr7uokpv1b/GCrvg4l9pSk9FjTlSANpS/0da5c5786b4fc57746cbea6d6c03467f/Asset_23RULES.png?quality=70&amp;width=800 800w, /assets/xrfr7uokpv1b/GCrvg4l9pSk9FjTlSANpS/0da5c5786b4fc57746cbea6d6c03467f/Asset_23RULES.png?quality=70&amp;width=640 640w, /assets/xrfr7uokpv1b/GCrvg4l9pSk9FjTlSANpS/0da5c5786b4fc57746cbea6d6c03467f/Asset_23RULES.png?quality=70&amp;width=480 480w" alt="Real-Time Alerting How It Works 2" loading="lazy"></div></div><h3>
</h3></div></div></div></div></div><div><div class="ptcom-design__paragraph__du7ili ptcom-design__paragraph200__du7ili ptcom-design__twoParagraph__du7ili"><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/6FYiDdd0DDMZDf4uM3R0D6/f8377936523f2a2544213c8299209df2/Asset_24RULES.png?quality=70&amp;width=1800" srcset="/assets/xrfr7uokpv1b/6FYiDdd0DDMZDf4uM3R0D6/f8377936523f2a2544213c8299209df2/Asset_24RULES.png?quality=70&amp;width=1600 1600w, /assets/xrfr7uokpv1b/6FYiDdd0DDMZDf4uM3R0D6/f8377936523f2a2544213c8299209df2/Asset_24RULES.png?quality=70&amp;width=1200 1200w, /assets/xrfr7uokpv1b/6FYiDdd0DDMZDf4uM3R0D6/f8377936523f2a2544213c8299209df2/Asset_24RULES.png?quality=70&amp;width=1000 1000w, /assets/xrfr7uokpv1b/6FYiDdd0DDMZDf4uM3R0D6/f8377936523f2a2544213c8299209df2/Asset_24RULES.png?quality=70&amp;width=800 800w, /assets/xrfr7uokpv1b/6FYiDdd0DDMZDf4uM3R0D6/f8377936523f2a2544213c8299209df2/Asset_24RULES.png?quality=70&amp;width=640 640w, /assets/xrfr7uokpv1b/6FYiDdd0DDMZDf4uM3R0D6/f8377936523f2a2544213c8299209df2/Asset_24RULES.png?quality=70&amp;width=480 480w" alt="Real-Time Alerting How It Works 3" loading="lazy"></div></div></div></div></div><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><hr><h2>Connect alerts to action. </h2><h3>Act on alerts from <a href="https://www.palantir.com/docs/foundry/workshop/overview/">Workshop</a> applications. Model-driven metrics computed in-platform indicate the impact of a decision when resolving an alert, helping users optimize choices in the face of difficult tradeoffs. The <a href="/platforms/foundry/">Foundry Ontology</a> orchestrates writeback across relevant systems of action, fueling continuous learning and maximizing existing technology investments. 

</h3></div></div></div></div></div></div></section><section id="rules-applications" class="ptcom-design__section__1o9c6nt ptcom-design__sectionlight__1o9c6nt" data-background="light"><div class="ptcom-design__container__1o9c6nt"><div class="ptcom-design__header__15wj5m3 ptcom-design__header200__15wj5m3"><div class="ptcom-design__animatedLine__116w76e ptcom-design__line__1c63wat ptcom-design__large__1c63wat"><div class="ptcom-design__animatedLineRule__116w76e" style="transform: translate(-100%, 0px);"></div></div><h2 data-testid="heading" data-animation="header" data-rendered-size="200" class="ptcom-design__heading__9pryq9 ptcom-design__heading200__9pryq9" style="opacity: 0;">Applications</h2></div><div><div class="ptcom-design__paragraph__du7ili ptcom-design__paragraph200__du7ili ptcom-design__twoParagraph__du7ili"><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><ul><li><p><b>Equipment Monitoring. </b>Generate alerts for potential equipment degradation or damage based on sensor data (e.g., based on temperature or pressure readings). </p></li><li><p><b>Cohorting. </b>Categorize entities into groups or “cohorts” based on pre-set rules (e.g., creating groups of customers with particular attributes in common for better targeted marketing). </p></li><li><p><b>Service Availability. </b>Monitor service availability to prevent interruptions and avoid triggering costly contractual outage clauses. </p></li><li><p><b>Data Labeling. </b>Create automatic labeling rules for data points to be used as inputs to AI/ML models. </p></li><li><p><b>Anti-Money Laundering. </b>Flag suspicious transactions through rules targeting both per-transaction and aggregated metrics. </p></li><li><p><b>Quality Control. </b>Identify patterns that suggest a substandard end product and stop defective products from shipping. </p></li></ul></div></div></div><div class="ptcom-design__column__du7ili"><div class="ptcom-design__text__1nkr7ha ptcom-design__text200__1nkr7ha"><div><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/5R4bye0W9siSxhWltjPYaO/e4eb917015da5d0501c317cc82341e79/Foundry_Rules_-_applications_2_-_cropped.jpg?quality=70&amp;width=1800" srcset="/assets/xrfr7uokpv1b/5R4bye0W9siSxhWltjPYaO/e4eb917015da5d0501c317cc82341e79/Foundry_Rules_-_applications_2_-_cropped.jpg?quality=70&amp;width=1600 1600w, /assets/xrfr7uokpv1b/5R4bye0W9siSxhWltjPYaO/e4eb917015da5d0501c317cc82341e79/Foundry_Rules_-_applications_2_-_cropped.jpg?quality=70&amp;width=1200 1200w, /assets/xrfr7uokpv1b/5R4bye0W9siSxhWltjPYaO/e4eb917015da5d0501c317cc82341e79/Foundry_Rules_-_applications_2_-_cropped.jpg?quality=70&amp;width=1000 1000w, /assets/xrfr7uokpv1b/5R4bye0W9siSxhWltjPYaO/e4eb917015da5d0501c317cc82341e79/Foundry_Rules_-_applications_2_-_cropped.jpg?quality=70&amp;width=800 800w, /assets/xrfr7uokpv1b/5R4bye0W9siSxhWltjPYaO/e4eb917015da5d0501c317cc82341e79/Foundry_Rules_-_applications_2_-_cropped.jpg?quality=70&amp;width=640 640w, /assets/xrfr7uokpv1b/5R4bye0W9siSxhWltjPYaO/e4eb917015da5d0501c317cc82341e79/Foundry_Rules_-_applications_2_-_cropped.jpg?quality=70&amp;width=480 480w" alt="Real-Time Alerting - Applications" loading="lazy"></div></div></div></div></div></div></div></div></section><section id="form-real-time-alerting" class="ptcom-design__section__1o9c6nt ptcom-design__sectionlight__1o9c6nt" data-background="light"><div class="ptcom-design__container__1o9c6nt"><div class="ptcom-design__formWrapper__1s5jo4t" data-axe="reviewed"><div class="ptcom-design__animatedLine__116w76e ptcom-design__line__1c63wat ptcom-design__large__1c63wat"><div class="ptcom-design__animatedLineRule__116w76e" style="transform: translate(-100%, 0px);"></div></div><h2 data-testid="heading" data-rendered-size="400" class="ptcom-design__heading__9pryq9 ptcom-design__heading400__9pryq9" style="opacity: 0;">Get in touch. </h2><div class="ptcom-design__form__1s5jo4t"><form class="ptcom-design__marketoFormWrap
