Vulnerability Scanning</header><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/XMt6CS4kqbDs2LZsBMTuM/28fc17538d5591e02b9f5604cda22986/1_9Qhi6KqQCX6Vcsiaim8KdQ.png?quality=70&amp;width=700&amp;height=366&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/XMt6CS4kqbDs2LZsBMTuM/28fc17538d5591e02b9f5604cda22986/1_9Qhi6KqQCX6Vcsiaim8KdQ.png?quality=70&amp;width=400 400w, /assets/xrfr7uokpv1b/XMt6CS4kqbDs2LZsBMTuM/28fc17538d5591e02b9f5604cda22986/1_9Qhi6KqQCX6Vcsiaim8KdQ.png?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/XMt6CS4kqbDs2LZsBMTuM/28fc17538d5591e02b9f5604cda22986/1_9Qhi6KqQCX6Vcsiaim8KdQ.png?quality=70&amp;width=900 900w" sizes="(min-width: 960px) 25vw, (min-width: 560px) 41.6667vw, 57vw" alt="Blue background with white text that reads: &quot;How Palantir Manages Continuous Vulnerability Scanning at Scale,&quot; small white arrow, large circle filled with small dots with some larger dots connected by lines" width="700" height="366" loading="lazy"></div></div></div><div class="ptcom-design__title__uynxlv"><div class="ptcom-design__text__1nkr7ha"><div><p>Effective vulnerability management is a cornerstone of any established security program. For complex cloud software providers like Palantir, staying on top of vulnerabilities and quickly remediating them is critical to staying ahead of our adversaries.&nbsp;</p></div></div></div><span class="ptcom-design__link__uynxlv"><span aria-hidden="true">↳</span> <span>Read more</span></span></a></li><li class="ptcom-design__cardItem__106sen8 ptcom-design__cardItem200__106sen8"><a class="ptcom-design__card__gb1gxh ptcom-design__card__uynxlv ptcom-design__card200__uynxlv" href="https://blog.palantir.com/how-palantir-apollo-saves-developer-time-on-kubernetes-71d51a5d24df"><div class="ptcom-design__container__uynxlv ptcom-design__containerImage__uynxlv"><header class="ptcom-design__earmark__uynxlv">Apollo WitchcraftServices</header><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/7rBi3jDbP8qr5c8t1ecTSJ/3e29f4b9b30f62a702e4d466f0bebd61/1_UqWbjpGQc6RBFXQMliiOnA.png?quality=70&amp;width=700&amp;height=367&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/7rBi3jDbP8qr5c8t1ecTSJ/3e29f4b9b30f62a702e4d466f0bebd61/1_UqWbjpGQc6RBFXQMliiOnA.png?quality=70&amp;width=400 400w, /assets/xrfr7uokpv1b/7rBi3jDbP8qr5c8t1ecTSJ/3e29f4b9b30f62a702e4d466f0bebd61/1_UqWbjpGQc6RBFXQMliiOnA.png?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/7rBi3jDbP8qr5c8t1ecTSJ/3e29f4b9b30f62a702e4d466f0bebd61/1_UqWbjpGQc6RBFXQMliiOnA.png?quality=70&amp;width=900 900w" sizes="(min-width: 960px) 25vw, (min-width: 560px) 41.6667vw, 57vw" alt="black background with white text that reads:&quot;Apollo Witchcraft - Services,&quot; small white arrow, large upside down cone-shaped image filled in with horizontal and vertical white lines " width="700" height="367" loading="lazy"></div></div></div><div class="ptcom-design__title__uynxlv"><div class="ptcom-design__text__1nkr7ha"><div><p>In this post, we further detail the problems organizations face when deploying on Kubernetes, the roles of the Apollo SDK and Service Management Plane, and examples of the value this has unlocked for Palantir.</p></div></div></div><span class="ptcom-design__link__uynxlv"><span aria-hidden="true">↳</span> <span>Read more</span></span></a></li><li class="ptcom-design__cardItem__106sen8 ptcom-design__cardItem200__106sen8"><a class="ptcom-design__card__gb1gxh ptcom-design__card__uynxlv ptcom-design__card200__uynxlv" href="https://platformengineering.org/talks-library/palantir-gitops-internal-developer-platform" target="_blank" rel="noopener noreferrer"><div class="ptcom-design__container__uynxlv ptcom-design__containerImage__uynxlv"><header class="ptcom-design__earmark__uynxlv">How Palantir Built Apollo</header><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/5MgH8lUEg2QdGcUWUWkrle/8c1ab79aa24d439fd9ffe3bebb74bfd9/Screen_Shot_2022-10-06_at_6.03.16_AM.png?quality=70&amp;width=700&amp;height=434&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/5MgH8lUEg2QdGcUWUWkrle/8c1ab79aa24d439fd9ffe3bebb74bfd9/Screen_Shot_2022-10-06_at_6.03.16_AM.png?quality=70&amp;width=400 400w, /assets/xrfr7uokpv1b/5MgH8lUEg2QdGcUWUWkrle/8c1ab79aa24d439fd9ffe3bebb74bfd9/Screen_Shot_2022-10-06_at_6.03.16_AM.png?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/5MgH8lUEg2QdGcUWUWkrle/8c1ab79aa24d439fd9ffe3bebb74bfd9/Screen_Shot_2022-10-06_at_6.03.16_AM.png?quality=70&amp;width=900 900w" sizes="(min-width: 960px) 25vw, (min-width: 560px) 41.6667vw, 57vw" alt="blue and green background with white text that reads: &quot;Palantir's GitOps Journey,&quot; encircled photo of Greg DeArment, image of a rocketship" width="700" height="434" loading="lazy"></div></div></div><div class="ptcom-design__title__uynxlv"><div class="ptcom-design__text__1nkr7ha"><div><p>Today, the Apollo platform serves hundreds of environments and services alongside more than 1,000 engineers working in four- to twelve-person teams. Learn more about its development history in this Platform Engineering post. </p></div></div></div><span class="ptcom-design__link__uynxlv"><span aria-hidden="true">↳</span> <span>Read more</span></span></a></li><li class="ptcom-design__cardItem__106sen8 ptcom-design__cardItem200__106sen8"><a class="ptcom-design__card__gb1gxh ptcom-design__card__uynxlv ptcom-design__card200__uynxlv" href="https://www.youtube.com/watch?v=Y9IHXu9NB9Y" target="_blank" rel="noopener noreferrer"><div class="ptcom-design__container__uynxlv ptcom-design__containerImage__uynxlv"><header class="ptcom-design__earmark__uynxlv">Apollo Explained </header><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/23vyHSsfyh86gwdFoGRVWS/2cae2e7610d83f419ad037f9064eee74/Screen_Shot_2022-09-22_at_7.54.45_AM.png?quality=70&amp;width=700&amp;height=387&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/23vyHSsfyh86gwdFoGRVWS/2cae2e7610d83f419ad037f9064eee74/Screen_Shot_2022-09-22_at_7.54.45_AM.png?quality=70&amp;width=400 400w, /assets/xrfr7uokpv1b/23vyHSsfyh86gwdFoGRVWS/2cae2e7610d83f419ad037f9064eee74/Screen_Shot_2022-09-22_at_7.54.45_AM.png?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/23vyHSsfyh86gwdFoGRVWS/2cae2e7610d83f419ad037f9064eee74/Screen_Shot_2022-09-22_at_7.54.45_AM.png?quality=70&amp;width=900 900w" sizes="(min-width: 960px) 25vw, (min-width: 560px) 41.6667vw, 57vw" alt="black background with scattered blue and black 3D boxes, some stacked on top of one another, others standing alone" width="700" height="387" loading="lazy"></div></div></div><div class="ptcom-design__title__uynxlv"><div class="ptcom-design__text__1nkr7ha"><div><p>Watch an animated overview of Palantir Apollo, and how it enables developers, operators, and security teams to focus on new value creation, instead of sinking time into writing and maintaining pipelines, scripts, and manual processes.</p></div></div></div><span class="ptcom-design__link__uynxlv"><span aria-hidden="true">↳</span> <span>Watch now</span></span></a></li><li class="ptcom-design__cardItem__106sen8 ptcom-design__cardItem200__106sen8"><a class="ptcom-design__card__gb1gxh ptcom-design__card__uynxlv ptcom-design__card200__uynxlv" href="/assets/xrfr7uokpv1b/3B5KbQ9ujsiDCX4Tnfz3Hy/8d3ee9a6911665f036ce3d28c19cfa0d/PalantirApolloTechnicalWhitePaper.pdf" target="_blank" rel="noopener noreferrer"><div class="ptcom-design__container__uynxlv ptcom-design__containerImage__uynxlv"><header class="ptcom-design__earmark__uynxlv">Whitepaper: Apollo Technical Overview</header><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/2p11NzZbbkGtEXXJYDGyUE/695d1985182f355ad4f0ee8a89bd05b4/2.png?quality=70&amp;width=700&amp;height=391&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/2p11NzZbbkGtEXXJYDGyUE/695d1985182f355ad4f0ee8a89bd05b4/2.png?quality=70&amp;width=400 400w, /assets/xrfr7uokpv1b/2p11NzZbbkGtEXXJYDGyUE/695d1985182f355ad4f0ee8a89bd05b4/2.png?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/2p11NzZbb 57vw" alt="black background, white text reads: &quot;Apollo Orchestration: Constraint-Based Deployment For Modern Architectures,&quot; white Apollo logo in lefthand corner" width="700" height="366" loading="lazy"></div></div></div><div class="ptcom-design__title__uynxlv"><div class="ptcom-design__text__1nkr7ha"><div><p>The first in a series about Palantir Apollo, aimed at unpacking what Apollo is, the problems it solves, and how its novel approach to software deployment can provide a competitive advantage in an increasingly complex and fragmented software landscape.</p></div></div></div><span class="ptcom-design__link__uynxlv"><span aria-hidden="true">↳</span> <span>Read more</span></span></a></li><li class="ptcom-design__cardItem__106sen8 ptcom-design__cardItem200__106sen8"><a class="ptcom-design__card__gb1gxh ptcom-design__card__uynxlv ptcom-design__card200__uynxlv" href="https://blog.palantir.com/palantir-apollo-powering-saas-where-no-saas-has-gone-before-7be3e565c379"><div class="ptcom-design__container__uynxlv ptcom-design__containerImage__uynxlv"><header class="ptcom-design__earmark__uynxlv">Blog: Where no SaaS has gone before</header><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/5ZRTkDhUyiZfaiWg15AcEW/2697ce12149e07503a8d86d0de01a7ef/Screen_Shot_2022-09-22_at_7.57.54_AM.png?quality=70&amp;width=700&amp;height=378&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/5ZRTkDhUyiZfaiWg15AcEW/2697ce12149e07503a8d86d0de01a7ef/Screen_Shot_2022-09-22_at_7.57.54_AM.png?quality=70&amp;width=400 400w, /assets/xrfr7uokpv1b/5ZRTkDhUyiZfaiWg15AcEW/2697ce12149e07503a8d86d0de01a7ef/Screen_Shot_2022-09-22_at_7.57.54_AM.png?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/5ZRTkDhUyiZfaiWg15AcEW/2697ce12149e07503a8d86d0de01a7ef/Screen_Shot_2022-09-22_at_7.57.54_AM.png?quality=70&amp;width=900 900w" sizes="(min-width: 960px) 25vw, (min-width: 560px) 41.6667vw, 57vw" alt="black background with boxed white text &quot;APOLLO where no SaaS has gone before&qu tectures and enable efficient independent software development. In this post, we’ll discuss how the Apollo Orchestration Engine works, and how we solved some of the problems inherent in continuous deployment of service oriented architectures.</p></div></div></div><span class="ptcom-design__link__uynxlv"><span aria-hidden="true">↳</span> <span>Learn more</span></span></a></li><li class="ptcom-design__cardItem__106sen8 ptcom-design__cardItem200__106sen8"><a class="ptcom-design__card__gb1gxh ptcom-design__card__uynxlv ptcom-design__card200__uynxlv" href="https://blog.palantir.com/a-sky-full-of-clouds-218b9db3f735"><div class="ptcom-design__container__uynxlv ptcom-design__containerImage__uynxlv"><header class="ptcom-design__earmark__uynxlv">Blog: A sky full of clouds</header><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/5KUsv0j0XBzOvb7fEcyjFE/d1644466712bbf4c224d2b1e639de673/Screen_Shot_2022-04-26_at_2.26.19_PM.png?quality=70&amp;width=700&amp;height=393&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/5KUsv0j0XBzOvb7fEcyjFE/d1644466712bbf4c224d2b1e639de673/Screen_Shot_2022-04-26_at_2.26.19_PM.png?quality=70&amp;width=400 400w, /assets/xrfr7uokpv1b/5KUsv0j0XBzOvb7fEcyjFE/d1644466712bbf4c224d2b1e639de673/Screen_Shot_2022-04-26_at_2.26.19_PM.png?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/5KUsv0j0XBzOvb7fEcyjFE/d1644466712bbf4c224d2b1e639de673/Screen_Shot_2022-04-26_at_2.26.19_PM.png?quality=70&amp;width=900 900w" sizes="(min-width: 960px) 25vw, (min-width: 560px) 41.6667vw, 57vw" alt="blue background with image of notebook with diagram of stick figure, arrows, and boxes" width="700" height="393" loading="lazy"></div></div></div><div class="ptcom-design__title__uynxlv"><div class="ptcom-design__text__1nkr7ha"><div><p>This article presents the complexities of running SaaS platforms in heterogeneous environments and sketches how Apollo managesour hundreds of dedicated installations across the fleet.</p></div></div></div><span class="ptcom-design__link__uynxlv"><span aria-hidden="true">↳</span> <span>Read more</span></span></a></li><li class="ptcom-design__cardItem__106sen8 ptcom-design__cardItem200__106sen8"><a class="ptcom-design__card__gb1gxh ptcom-design__card__uynxlv ptcom-design__card200__uynxlv" href="/assets/xrfr7uokpv1b/4TA6uSCJQAnPGQ2642uSKU/3a38de562968e3a2a9c99f8d96425c5f/Apollo_for_Builders.pdf" target="_blank" rel="noopener noreferrer"><div class="ptcom-design__container__uynxlv ptcom-design__containerImage__uynxlv"><header class="ptcom-design__earmark__uynxlv">Whitepaper: Apollo for Builders</header><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/6Jf9y8bSZAU4UrCj5GQYJS/67840628999fd93b386c39402981c5da/shutterstock_1868429770.jpg?quality=70&amp;width=700&amp;height=394&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/6Jf9y8bSZAU4UrCj5GQYJS/67840628999fd93b386c39402981c5da/shutterstock_1868429770.jpg?quality=70&amp;width=400 400w, /assets/xrfr7uokpv1b/6Jf9y8bSZAU4UrCj5GQYJS/67840628999fd93b386c39402981c5da/shutterstock_1868429770.jpg?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/6Jf9y8bSZAU4UrCj5GQYJS/67840628999fd93b386c39402981c5da/shutterstock_1868429770.jpg?quality=70&amp;width=900 900w" sizes="(min-width: 960px) 25vw, (min-width: 560px) 41.6667vw, 57vw" alt="close up image of a satellite above the earth " width="700" height="394" loading="lazy"></div></div></div><div class="ptcom-design__title__uynxlv"><div class="ptcom-design__text__1nkr7ha"><div><p>To win, startups must ensure their software can reach all customers and support mission-critical use. Apollo is designed to handle the complexity of deployment so engineers can focus on what they do best —building software to change the world</p></div></div></div><span class="ptcom-design__link__uynxlv"><span aria-hidden="true">↳</span> <span>Download now</span></span></a></li><li class="ptcom-design__cardItem__106sen8 ptcom-design__cardItem200__106sen8"><a class="ptcom-design__card__gb1gxh ptcom-design__card__uynxlv ptcom-design__card200__uynxlv" href="/assets/xrfr7uokpv1b/ECuz16kcqKOQ2P0jBBnVy/fd84e054ee75b9baf9151851d1c30bf9/ApolloForEdge.pdf" target="_blank" rel="noopener noreferrer"><div class="ptcom-design__container__uynxlv ptcom-design__containerImage__uynxlv"><header class="ptcom-design__earmark__uynxlv">Whitepaper: Apollo for Edge</header><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/1rb2yISbvSMhHhOqoRC8sT/d3f8099a131588a7d872d8c1efdc5414/Screen_Shot_2022-04-27_at_9.47.39_AM.png?quality=70&amp;width=700&amp;height=402&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/1rb2yISbvSMhHhOqoRC8sT/d3f8099a131588a7d872d8c1efdc5414/Screen_Shot_2022-04-27_at_9.47.39_AM.png?quality=70&amp;width=400 400w, /assets/xrfr7uokpv1b/1rb2yISbvSMhHhOqoRC8sT/d3f8099a131588a7d872d8c1efdc5414/Screen_Shot_2022-04-27_at_9.47.39_AM.png?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/1rb2yISbvSMhHhOqoRC8sT/d3f8099a131588a7d872d8c1efdc5414/Screen_Shot_2022-04-27_at_9.47.39_AM.png?quality=70&amp;width=900 900w" sizes="(min-width: 960px) 25vw, (min-width: 560px) 41.6667vw, 57vw" alt="orange apparatus" width="700" height="402" loading="lazy"></div></div></div><div class="ptcom-design__title__uynxlv"><div class="ptcom-design__text__1nkr7ha"><div><p>From the machines on the factory floor to the drones monitoring our farmlands, critical operations decisions are moving further to the edge. Palantir Apollo allows operators to write code once and deploy to virtually any environment.</p></div></div></div><span class="ptcom-design__link__uynxlv"><span aria-hidden="true">↳</span> <span>Download now</span></span></a></li><li class="ptcom-design__cardItem__106sen8 ptcom-design__cardItem200__106sen8"><a class="ptcom-design__card__gb1gxh ptcom-design__card__uynxlv ptcom-design__card200__uynxlv" href="https://youtu.be/JfGdHo4NsS4" target="_blank" rel="noopener noreferrer"><div class="ptcom-design__container__uynxlv ptcom-design__containerImage__uynxlv"><header class="ptcom-design__earmark__uynxlv">Video: Powering Cloud 2.0</header><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/7muKUrJQAk5V3nd6UQOWsh/7e96e5eea526a612111150e1f0e73ebd/Screen_Shot_2022-04-26_at_2.07.37_PM.png?quality=70&amp;width=700&amp;height=343&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/7muKUrJQAk5V3nd6UQOWsh/7e96e5eea526a612111150e1f0e73ebd/Screen_Shot_2022-04-26_at_2.07.37_PM.png?quality=70&amp;width=400 400w, /assets/xrfr7uokpv1b/7muKUrJQAk5V3nd6UQOWsh/7e96e5eea526a612111150e1f0e73ebd/Screen_Shot_2022-04-26_at_2.07.37_PM.png?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/7muKUrJQAk5V3nd6UQOWsh/7e96e5eea526a612111150e1f0e73ebd/Screen_Shot_2022-04-26_at_2.07.37_PM.png?quality=70&amp;width=900 900w" sizes="(min-width: 960px) 25vw, (min-width: 560px) 41.6667vw, 57vw" alt="man drawing a diagram of four connected cylinders on a window, text reads: Greg DeArment, Group Engineering Lead, Production Infrastructure, Palantir" width="700" height="343" loading="lazy"></div></div></div><div class="ptcom-design__title__uynxlv"><div class="ptcom-design__text__1nkr7ha"><div><p>Most SaaS products only run in the public cloud, limiting where software can be deployed. From satellites to classified networks, Palantir Apollo brings the agility and stability of SaaS to Cloud 2.0.</p></div></div></div><span class="ptcom-design__link__uynxlv"><span aria-hidden="true">↳</span> <span>Watch now</span></span></a></li><li class="ptcom-design__cardItem__106sen8 ptcom-design__cardItem200__106sen8"><a class="ptcom-design__card__gb1gxh ptcom-design__card__uynxlv ptcom-design__card200__uynxlv" href="https://www.youtube.com/watch?v=3kSGlg8d5mI" target="_blank" rel="noopener noreferrer"><div class="ptcom-design__container__uynxlv ptcom-design__containerImage__uynxlv"><header class="ptcom-design__earmark__uynxlv">Video: Apollo Demo Day</header><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/4T3ap3DaPB5Jvshc0hQUaK/8ed46efab7c0cb27c516afba063
