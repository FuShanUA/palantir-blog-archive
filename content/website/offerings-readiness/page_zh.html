<section id="headerm" class="ptcom-design__section__1o9c6nt ptcom-design__sectionlight__1o9c6nt" data-background="light"><div class="ptcom-design__container__1o9c6nt"><div class="ptcom-design__wrapper__gwkw56"><div class="ptcom-design__header__15wj5m3 ptcom-design__header400__15wj5m3"><h1 data-testid="heading" data-animation="header" data-rendered-size="400" class="ptcom-design__heading__9pryq9 ptcom-design__heading400__9pryq9" style="opacity: 1;">Palantir 就绪状态</h1><div class="ptcom-design__description__15wj5m3" style="transform: translate(0px, 0px); opacity: 1;"><div class="ptcom-design__text__1nkr7ha ptcom-design__descriptionText__15wj5m3"><div><p>Palantir 能够全面掌握资产、人员和财务运营情况，助力确保组织达到就绪状态。</p></div></div></div></div><div class="ptcom-design__content__gwkw56"><div class="ptcom-design__image__1bamxf7 ptcom-design__image__17ddpdv"><div><video src="/assets/xrfr7uokpv1b/2VH1gFGIRZHx2WxYX5tQYH/793461b040ecce679071bb42cd59d77f/shutterstock_1020773842.mov" autoplay="" loop="" playsinline="" controls=""><source src="/assets/xrfr7uokpv1b/2VH1gFGIRZHx2WxYX5tQYH/793461b040ecce679071bb42cd59d77f/shutterstock_1020773842.mov?format=mp4" type="video/mp4"></video></div></div></div></div></div></section>
<section id="are-you-ready" class="ptcom-design__section__1o9c6nt ptcom-design__sectionlight__1o9c6nt" data-background="light"><div class="ptcom-design__container__1o9c6nt"><div class="ptcom-design__feature__1hq6lk2 ptcom-design__feature400__1hq6lk2" data-animation="feature"><div class="ptcom-design__animatedLine__116w76e ptcom-design__line__1c63wat"><div class="ptcom-design__animatedLineRule__116w76e" style="transform: translate(0px, 0px);"></div></div><div class="ptcom-design__earmark__1td37w">01 /</div><h1 data-testid="heading" data-animation="header" data-rendered-size="300" class="ptcom-design__heading__9pryq9 ptcom-design__heading300__9pryq9" style="opacity: 1;">您准备好了吗？</h1><figure class="ptcom-design__figure__1hq6lk2"><div class="ptcom-design__image__1hq6lk2"><div class="ptcom-design__image__1bamxf7 ptcom-design__image__17ddpdv"><div><img src="/assets/xrfr7uokpv1b/1wFISJVGfBRIEWA9Pn3BfA/7ff5cc340aea87452ab2cdad6d031788/Screen_Shot_2022-08-01_at_4.47.52_PM.png?quality=70&amp;width=1600&amp;height=2383&amp;fit=crop" srcset="/assets/xrfr7uokpv1b/1wFISJVGfBRIEWA9Pn3BfA/7ff5cc340aea87452ab2cdad6d031788/Screen_Shot_2022-08-01_at_4.47.52_PM.png?quality=70&amp;width=600 600w, /assets/xrfr7uokpv1b/1wFISJVGfBRIEWA9Pn3BfA/7ff5cc340aea87452ab2cdad6d031788/Screen_Shot_2022-08-01_at_4.47.52_PM.png?quality=70&amp;width=900 900w, /assets/xrfr7uokpv1b/1wFISJVGfBRIEWA9Pn3BfA/7ff5cc340aea87452ab2cdad6d031788/Screen_Shot_2022-08-01_at_4.47.52_PM.png?quality=70&amp;width=1200 1200w, /assets/xrfr7uokpv1b/1wFISJVGfBRIEWA9Pn3BfA/7ff5cc340aea87452ab2cdad6d031788/Screen_Shot_2022-08-01_at_4.47.52_PM.png?quality=70&amp;width=1600 1600w, /assets/xrfr7uokpv1b/1wFISJVGfBRIEWA9Pn3BfA/7ff5cc340aea87452ab2cdad6d031788/Screen_Shot_2022-08-01_at_4.47.52_PM.png?quality=70&amp;width=2200 2200w" sizes="100vw" alt="Scientists collaborating in a lab." width="1600" height="2383" loading="eager"></div></div></div></figure><div class="ptcom-design__content__1hq6lk2"><div data-animation="feature" class="ptcom-design__description__1hq6lk2" style="transform: translate(0%, 10%); opacity: 0;"><div><p>准备好应对下一次公共卫生危机了吗？</p><p>准备好应对下一场对抗性冲突了吗？</p><p>准备好基于突发需求或预算缩减来重新排定财务优先事项了吗？</p></div></div><div data-animation="feature" class="ptcom-design__text__1hq6lk2" style="transform: translate(0%, 10%); opacity: 0;"><div><p>政府机构若要实现最关键的目标，必须优化其最宝贵资源的管理、配置和开发。</p><p>这就需要具备一种就绪能力，能够从数据中提取可付诸行动的信息和洞察。</p><p>为助力政府机构更好地履行使命，Palantir 开发了高度专业化、可快速部署的软件模块，并针对财务、资产和人事管理配备了业界领先的细粒度访问控制。</p></div></div><div data-animation="feature" class="ptcom-design__ctaWrap__1hq6lk2" style="transform: translate(0%, 10%); opacity: 0;"><div class="ptcom-design__cta__1dfmz0b"><a class="ptcom-design__ctaLink__1dfmz0b" href="https://carahevents.carahsoft.com/Event/Form/308147-87202058e473487fa7342cee64fdfe51">立即联系我们 <span aria-hidden="true">→</span></a></div></div></div></div></div></section>
