<h1>Palantir 沉痛悼念 Sergio Marchionne</h1>
<blockquote>
<p>Palantir 的全体同仁对 Sergio Marchionne 的离世深感悲痛。无论在哪个领域，他都是一位富有远见的领袖，更是我们尊贵的合作伙伴。我们将永远铭记 Sergio 对其企业中的人员、技术以及环境所倾注的深思熟虑与人文关怀。在此，我们向他的家人，以及 FCA、法拉利（Ferrari）和 Exor 集团的全体员工致以最深切的慰问。</p>
<p>↳ Alex Karp 博士，Palantir 首席执行官</p>
