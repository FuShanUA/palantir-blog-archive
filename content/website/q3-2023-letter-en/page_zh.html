</i>一、</h3><h3>我们创造了公司成立二十年来最高的利润。</h3><h3>2023年第三季度，我们实现净利润7200万美元；过去十二个月累计实现净利润1.47亿美元。</h3><h3>公司从亏损走向盈利的速度，印证了我们多年来构建并不断完善的软件平台所具备的强大实力与成熟度。</h3><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/yWGjz9ZRxyOT88EmKeTDn/d35a0eeb12efd41d63d7c19a43f7ddb6/Q3-2023-Earnings_Net_Income__1_.png?quality=70&amp;width=1800" srcset="/assets/xrfr7uokpv1b/yWGjz9ZRxyOT88EmKeTDn/d35a0eeb12efd41d63d7c19a43f7ddb6/Q3-2023-Earnings_Net_Income__1_.png?quality=70&amp;width=1600 1600w, /assets/xrfr7uokpv1b/yWGjz9ZRxyOT88EmKeTDn/d35a0eeb12efd41d63d7c19a43f7ddb6/Q3-2023-Earnings_Net_Income__1_.png?quality=70&amp;width=1200 1200w, /assets/xrfr7uokpv1b/yWGjz9ZRxyOT88EmKeTDn/d35a0eeb12efd41d63d7c19a43f7ddb6/Q3-2023-Earnings_Net_Income__1_.png?quality=70&amp;width=1000 1000w, /assets/xrfr7uokpv1b/yWGjz9ZRxyOT88EmKeTDn/d35a0eeb12efd41d63d7c19a43f7ddb6/Q3-2023-Earnings_Net_Income__1_.png?quality=70&amp;width=800 800w, /assets/xrfr7uokpv1b/yWGjz9ZRxyOT88EmKeTDn/d35a0eeb12efd41d63d7c19a43f7ddb6/Q3-2023-Earnings_Net_Income__1_.png?quality=70&amp;width=640 640w, /assets/xrfr7uokpv1b/yWGjz9ZRxyOT88EmKeTDn/d35a0eeb12efd41d63d7c19a43f7ddb6/Q3-2023-Earnings_Net_Income__1_.png?quality=70&amp;width=480 480w" alt="Q3 2023 Earnings - Chart 1 - English" loading="lazy"></div></div><h3>基于这些业绩，公司现已具备入选标普500指数的资格，这是我们一直努力追求并深知触手可及的里程碑。</h3><h3>然而，我们对盈利能力的专注，不会影响我们更宏大的抱负和整体业务的增长。</h3><h3>2023年第三季度，我们实现营收5.58亿美元，同比增长17%。</h3><div class="ptcom-design__image__1bamxf7"><div><img src="/assets/xrfr7uokpv1b/N5MvWh0C1LnuryxPsATN4/aaf14d2caa12432bf73c7e65db9f37cb/Q3-2023-Earnings_Revenue.png?quality=70&amp;width=1800" srcset="/assets/xrfr7uokpv1b/N5MvWh0C1LnuryxPsATN4/aaf14d2caa12432bf73c7e65db9f37cb/Q3-2023-Earnings_Revenue.png?quality=70&amp;width=1600 1600w, /assets/xrfr7uokpv1b/N5MvWh0C1LnuryxPsATN4/aaf14d2caa12432bf73c7e65db9f37cb/Q3-2023-Earnings_Revenue.png?quality=70&amp;width=1200 1200w, /assets/xrfr7uokpv1b/N5MvWh0C1LnuryxPsATN4/aaf14d
